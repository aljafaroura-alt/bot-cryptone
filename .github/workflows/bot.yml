name: Bot Cryptone 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

concurrency:
  group: bot-cryptone
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore cached state files
        uses: actions/cache@v3
        with:
          path: |
            oi_history_persist.json
            learning_data.json
            predictions.json
            wallet_tracker_state.json
            *.db
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: Save state files after run
        if: always()
        uses: actions/cache/save@v3
        with:
          path: |
            oi_history_persist.json
            learning_data.json
            predictions.json
            wallet_tracker_state.json
            *.db
          key: bot-state-${{ github.run_id }}