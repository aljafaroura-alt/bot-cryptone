name: Bot Cryptone 24/7
concurrency:
  group: bot-cryptone
  cancel-in-progress: true
  
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python bot.py
