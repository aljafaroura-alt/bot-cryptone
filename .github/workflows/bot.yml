name: Bot Cryptone 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'  # tiap 20 menit

concurrency:
  group: bot-cryptone
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # tetap, tapi bot akan mati setelah ini
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Restore cached state files
        uses: actions/cache@v3
        with:
          path: |
            oi_history_persist.json
            learning_data.json
            predictions.json
            wallet_tracker_state.json
          # PERBAIKAN: Gunakan key tetap (bukan run_id)
          key: bot-state-${{ runner.os }}-persist
          restore-keys: bot-state-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python bot.py
      
      - name: Save state files after run
        if: always()
        uses: actions/cache/save@v3
        with:
          path: |
            oi_history_persist.json
            learning_data.json
            predictions.json
            wallet_tracker_state.json
          # PERBAIKAN: Gunakan key yang sama dengan restore
          key: bot-state-${{ runner.os }}-persist
